<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Expocafé</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="https://engenharia360.com/wp-content/uploads/2025/12/cursos-de-agronomia-no-brasil-3.jpg" class="avatar">
      <div>
        <span class="name">Erick Fernandes</span>
        <span class="username">@erick_fernandes</span>
      </div>
    </div>

    <p class="post-text">
      Hoje começamos a analisar nossas lavouras de café!  
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
       <button id="dislikeBtn">Descurtir</button>
      <span id="dislikeCount">0</span>
    </div>
     
 


    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p> Safra 26/27</p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p> Coleita25/26</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
